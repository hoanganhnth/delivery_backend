# Service Configuration
spring.application.name=match-service
server.port=8091

# External Service URLs (legacy — sẽ xoá sau khi migration hoàn tất)
tracking.service.url=http://localhost:8090

# Redis Configuration (local replica cho shipper locations)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.database=0

# ✅ Kafka Configuration for event-driven communication
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=match-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.use-type-info-headers=false
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false

# Jackson Configuration for LocalDateTime
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# Logging
logging.level.com.delivery.match_service=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
logging.level.org.springframework.kafka=ERROR
logging.level.org.apache.kafka=ERROR
