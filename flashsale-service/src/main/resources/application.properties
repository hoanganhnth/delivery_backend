server.port=8092
spring.application.name=flashsale-service

spring.datasource.url=jdbc:mysql://localhost:3306/delivery_flashsale?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=flashsale-group
spring.kafka.consumer.auto-offset-reset=earliest
