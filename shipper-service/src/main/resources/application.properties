# Service name và port
spring.application.name=shipper-service
server.port=8086

# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/shipper_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Security logging (for debugging)
logging.level.org.springframework.security=DEBUG

# ✅ Kafka Configuration for Event-Driven Communication
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Configuration
spring.kafka.consumer.group-id=shipper-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Listener Configuration
spring.kafka.listener.ack-mode=manual
