# Docker Compose Override for Development
# This file is automatically loaded by docker-compose
# Use: docker-compose up (automatically includes override)

version: '3.8'

services:
  notification-service:
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_DELIVERYVN=DEBUG
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL=true
    volumes:
      # Hot reload for development (if using DevTools)
      - .:/app:cached
      - maven_cache:/root/.m2
    ports:
      - "8087:8087"
      - "5005:5005" # Debug port
    command: >
      bash -c "
        echo 'Starting Notification Service in Development Mode...'
        java -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 
             -Dspring.profiles.active=dev 
             -jar app.jar
      "

  postgres:
    environment:
      - POSTGRES_LOG_STATEMENT=all
      - POSTGRES_LOG_MIN_DURATION_STATEMENT=0
    ports:
      - "5432:5432"

  redis:
    command: redis-server /usr/local/etc/redis/redis.conf --loglevel verbose
    ports:
      - "6379:6379"

  kafka:
    environment:
      # Development settings
      - KAFKA_LOG_RETENTION_HOURS=1
      - KAFKA_LOG_SEGMENT_BYTES=104857600
      - KAFKA_LOG_CLEANUP_POLICY=delete
    ports:
      - "9092:9092"

  # Add development tools
  kafka-ui:
    ports:
      - "8080:8080"

  redis-commander:
    ports:
      - "8081:8081"

  pgadmin:
    ports:
      - "8082:80"

volumes:
  maven_cache:
    driver: local
