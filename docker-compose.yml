
services:
  # --- HẠ TẦNG (INFRASTRUCTURE) ---
  postgres:
    image: postgres:16-alpine
    container_name: delivery-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - delivery-network

  redis:
    image: redis:7-alpine
    container_name: delivery-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - delivery-network

  # ✅ KAFKA TRONG CHẾ ĐỘ KRAFT (KHÔNG CẦN ZOOKEEPER)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: delivery-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # UUID định danh Cluster (đã tạo sẵn cho bạn)
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - delivery-network

  elasticsearch:
    image: elasticsearch:7.17.10
    container_name: delivery-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - delivery-network

  # --- MICROSERVICES ---
  api-gateway:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE_PATH: api-gateway } }
    container_name: api-gateway
    ports: ["8079:8079"]
    environment: { JAVA_OPTS: "-Xmx384m -Xms256m" }
    deploy: { resources: { limits: { memory: 512M } } }
    networks: [delivery-network]

  auth-service:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE_PATH: auth-service } }
    container_name: auth-service
    ports: ["8081:8081"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_OPTS: "-Xmx384m -Xms256m"
    deploy: { resources: { limits: { memory: 512M } } }
    depends_on: [postgres, kafka]
    networks: [delivery-network]

  user-service:
    build: { context: ., dockerfile: Dockerfile, args: { SERVICE_PATH: user-service } }
    container_name: user-service
    ports: ["8082:8082"]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: postgres
