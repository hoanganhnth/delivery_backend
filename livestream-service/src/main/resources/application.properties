spring.application.name=livestream-service
server.port=8092

# DataSource config (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/livestream_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.enable-idempotence=true

# Agora Configuration
agora.app-id=YOUR_AGORA_APP_ID
agora.app-certificate=YOUR_AGORA_APP_CERTIFICATE

# Rate Limiting Configuration
livestream.rate-limit.start-cooldown-seconds=60
livestream.rate-limit.end-cooldown-seconds=10

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.delivery.livestream_service=INFO
