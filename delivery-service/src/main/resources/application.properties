spring.application.name=delivery-service
server.port=8085

# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/delivery_db
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Security logging (for debugging)
logging.level.org.springframework.security=DEBUG

# Hide Kafka connection spam when Kafka is not running
logging.level.org.apache.kafka=ERROR

# Redis Configuration
# Set spring.data.redis.enabled=false nếu Redis không chạy – server vẫn start bình thường
spring.data.redis.enabled=true
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.database=0

# ✅ Kafka Configuration - Independent microservice approach
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=delivery-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use-type-info-headers=false
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.listener.ack-mode=manual

